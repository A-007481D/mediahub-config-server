server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/A-007481D/mediahub-config-server.git
          default-label: main
          search-paths: '{application}'
          username: ${GIT_USER}
          password: ${GIT_TOKEN}
          clone-on-start: true


eureka:
  client:
    service-url:
      default-zone: ${EUREKA_URL:http://localhost:8761/eureka/}
